seed: 42
device: auto
output_dir: RIGCrop/runs/rig_crop_cpc_joint

batch_size: 16
num_workers: 4
epochs: 30
lr: 0.0001
weight_decay: 0.0001

train_dataset:
  jsonl_path: data/cpc_rig/metadata/train.jsonl
  image_size: 384
  crop_size: 224
  max_records:
  max_pairs_per_record: 128
  max_nodes: 12
  derive_pairs_from_scores: true

val_dataset:
  jsonl_path: data/cpc_rig/metadata/val.jsonl
  image_size: 384
  crop_size: 224
  max_records:
  max_pairs_per_record: 128
  max_nodes: 12
  derive_pairs_from_scores: true

model:
  d_model: 384
  max_nodes: 12
  box_feat_dim: 8
  backbone:
    type: dinov3_hf
    # Replace with your server-local DINOv3 directory when weights are downloaded.
    name: facebook/dinov3-vitb16-pretrain-lvd1689m
    pretrained: true
    trust_remote_code: true
  num_entity_layers: 6
  num_crop_layers: 3
  num_crop_queries: 16
  nhead: 8
  dropout: 0.1

loss:
  crop_pair: 1.0
  node: 0.3
  relation: 0.2
  utility: 0.3
  query: 0.1
  action: 0.05
