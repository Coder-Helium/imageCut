seed: 42
device: auto
output_dir: RIGCrop/runs/rig_crop_cpc_gaic_dinov3_pth

# DDP uses this as per-process batch size. Start conservatively for DINOv3-B.
batch_size: 4
num_workers: 4
epochs: 30
log_interval: 1000
lr: 0.0001
weight_decay: 0.0001

train_datasets:
  - jsonl_path: data/cpc_rig/metadata/train.jsonl
    image_size: 384
    crop_size: 224
    max_records:
    max_pairs_per_record: 128
    max_nodes: 12
    derive_pairs_from_scores: true
  - jsonl_path: data/gaic_rig/metadata/train.jsonl
    image_size: 384
    crop_size: 224
    max_records:
    max_pairs_per_record: 128
    max_nodes: 12
    derive_pairs_from_scores: true
    min_score_gap: 0.05

val_dataset:
  jsonl_path: data/cpc_rig/metadata/val.jsonl
  image_size: 384
  crop_size: 224
  max_records:
  max_pairs_per_record: 128
  max_nodes: 12
  derive_pairs_from_scores: true

model:
  d_model: 384
  max_nodes: 12
  box_feat_dim: 8
  backbone:
    type: torchhub_dinov3
    repo: /home/mx/dinov3
    source: local
    name: dinov3_vitb16
    pretrained: true
    weights: /home/mx/dinov3/dinov3_vitb16_pretrain_lvd1689m-73cec8be.pth
  num_entity_layers: 6
  num_crop_layers: 3
  num_crop_queries: 16
  nhead: 8
  dropout: 0.1

loss:
  crop_pair: 1.0
  node: 0.3
  relation: 0.2
  utility: 0.3
  query: 0.1
  action: 0.05
