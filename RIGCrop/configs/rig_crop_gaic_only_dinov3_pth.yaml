seed: 42
device: auto
output_dir: RIGCrop/runs/rig_crop_gaic_only_dinov3_pth
best_metric: val_gaic_acc10

# GAIC-only training is smaller than CPC+GAIC mixed training, but the listwise
# branch scores all GAICD candidates per image. Start conservatively.
batch_size: 16
gaic_listwise_batch_size: 1
gaic_val_batch_size: 1
gaic_listwise_every: 1
gaic_eval_interval: 1
num_workers: 6
persistent_workers: true
prefetch_factor: 2
epochs: 20
log_interval: 200
ddp_timeout_seconds: 7200
find_unused_parameters: false
lr: 0.00003
weight_decay: 0.0001

train_datasets:
  - jsonl_path: /root/autodl-tmp/data/beauty_dataset/data/gaic_rig/metadata/train.compact.jsonl
    image_size: 384
    crop_size: 224
    max_records:
    max_pairs_per_record: 128
    max_nodes: 12
    derive_pairs_from_scores: true
    min_score_gap: 0.05
    image_cache_size: 8
    compact_records: true
    return_crops: false

gaic_listwise_train_dataset:
  jsonl_path: /root/autodl-tmp/data/beauty_dataset/data/gaic_rig/metadata/train.compact.jsonl
  image_size: 384
  max_records:
  max_nodes: 12
  max_candidates:
  compact_records: true
  image_cache_size: 8

gaic_listwise_val_dataset:
  jsonl_path: /root/autodl-tmp/data/beauty_dataset/data/gaic_rig/metadata/val.compact.jsonl
  image_size: 384
  max_records:
  max_nodes: 12
  max_candidates:
  compact_records: true
  image_cache_size: 8

val_dataset:
  jsonl_path: /root/autodl-tmp/data/beauty_dataset/data/gaic_rig/metadata/val.compact.jsonl
  image_size: 384
  crop_size: 224
  max_records:
  max_pairs_per_record: 128
  max_nodes: 12
  derive_pairs_from_scores: true
  min_score_gap: 0.05
  image_cache_size: 8
  compact_records: true
  return_crops: false

model:
  d_model: 384
  max_nodes: 12
  box_feat_dim: 8
  backbone:
    type: torchhub_dinov3
    repo: /root/dinov3
    source: local
    name: dinov3_vitb16
    pretrained: true
    weights: /root/dinov3/dinov3_vitb16_pretrain_lvd1689m-73cec8be.pth
  num_entity_layers: 6
  num_crop_layers: 3
  num_crop_queries: 16
  crop_feature_mode: roi_tokens
  crop_pool_size: 4
  nhead: 8
  dropout: 0.1

loss:
  crop_pair: 1.0
  gaic_listwise: 0.7
  gaic_topk: 0.7
  gaic_listwise_temperature: 0.30
  gaic_topk_positive: 5
  gaic_topk_negative_after: 10
  gaic_topk_margin: 1.0
  node: 0.1
  relation: 0.06
  utility: 0.15
  query: 0.05
  action: 0.0
